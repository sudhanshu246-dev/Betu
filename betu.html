<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Betu 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            max-width: 900px;
            width: 95%;
            text-align: center;
            animation: zoomIn 1.2s ease;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.8rem;
            color: #e84393;
            animation: slideDown 1.5s;
        }

        h2 {
            margin-bottom: 20px;
            color: #555;
            animation: fadeIn 2s;
        }

        .heart {
            font-size: 3.5rem;
            animation: pulse 1s infinite;
        }

        .letter {
            margin: 25px 0;
            min-height: 180px;
            font-size: 1.2rem;
            line-height: 2;
        }

        .quotes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            padding: 25px;
            border-radius: 20px;
            font-size: 1.05rem;
            animation: cardPop 2s infinite alternate;
        }

        .card:hover {
            transform: scale(1.1) rotate(2deg);
        }

        .teddies .teddy {
            position: absolute;
            font-size: 3rem;
            animation: bounce 4s infinite;
        }

        .teddies .teddy:nth-child(1) {
            left: 10%;
            animation-delay: 0s;
        }

        .teddies .teddy:nth-child(2) {
            left: 30%;
            animation-delay: 1s;
        }

        .teddies .teddy:nth-child(3) {
            left: 60%;
            animation-delay: 2s;
        }

        .teddies .teddy:nth-child(4) {
            left: 85%;
            animation-delay: 3s;
        }

        .hearts span {
            position: absolute;
            font-size: 1.8rem;
            animation: floatUp 6s linear infinite;
        }

        button {
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 40px;
            background: #e84393;
            color: white;
            cursor: pointer;
            animation: glow 1.5s infinite;
        }

        #proposal {
            display: none;
            margin-top: 25px;
            font-size: 1.4rem;
            color: #e84393;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes bounce {
            0% {
                top: 110%;
            }

            50% {
                top: 40%;
            }

            100% {
                top: -10%;
            }
        }

        @keyframes cardPop {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-20px);
            }
        }

        @keyframes floatUp {
            from {
                top: 100%;
                opacity: 1;
            }

            to {
                top: -10%;
                opacity: 0;
            }
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 10px #ff6b81;
            }

            50% {
                box-shadow: 0 0 25px #ff6b81;
            }

            100% {
                box-shadow: 0 0 10px #ff6b81;
            }
        }
    </style>
</head>

<body>

    <!-- Music -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7c8c8bdb0c.mp3" type="audio/mpeg">
    </audio>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Teddy Bears -->
    <div class="teddies">
        <div class="teddy">🧸</div>
        <div class="teddy">🧸</div>
        <div class="teddy">🧸</div>
        <div class="teddy">🧸</div>
    </div>

    <div class="container">
        <div class="heart">💖</div>
        <h1>Happy Proposal Day</h1>
        <h2>My Dearest Betu 🌸</h2>

        <div class="letter">
            <p id="typed"></p>
        </div>

        <div class="quotes">
            <div class="card">You are my today and all of my tomorrows 💕</div>
            <div class="card">Falling for you was never a choice 🌷</div>
            <div class="card">My heart smiles when I think of you 🧸</div>
            <div class="card">You + Me = Forever 💞</div>
        </div>

        <button onclick="startMagic()">Tap Here Betu 💖</button>

        <div id="proposal">
            Will you be mine forever? 🌹
            <div style="margin-top:20px;">
                <button onclick="yesAnswer()" style="background:#2ecc71;margin:10px;">YES 💕</button>
                <button onclick="noAnswer()" style="background:#ff7675;margin:10px;">NO 🙈</button>
            </div>
            <div id="response"></div>
        </div>
    </div>

    <script>
        // Love letter typing text (FIXED)
        const text = `Dear Betu,

From the day you came into my life, everything started feeling softer and warmer.
Your smile has a magic that makes my heart feel calm and happy.

Today is Proposal Day, and I just want to ask you one simple thing with all my heart.

Forever yours 💖`;

        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                const char = text.charAt(i);
                document.getElementById("typed").innerHTML += char === "\n" ? "<br>" : char;
                i++;
                setTimeout(typeWriter, 40);
            }
        }

        // Start animations + music (FIXED function)
        function startMagic() {
            document.getElementById("proposal").style.display = "block";
            document.getElementById("bgMusic").play();
            createHearts();
        }

        // YES / NO buttons
        function yesAnswer() {
            document.getElementById("response").innerHTML = "Yayyy 💖 You just made my world brighter, Betu 🥹🌸";
        }

        function noAnswer() {
            document.getElementById("response").innerHTML = "It's okay Betu 🤍 My feelings will always respect you.";
        }

        // Floating hearts generator (NEW & FIXED)
        function createHearts() {
            const heartsContainer = document.querySelector('.hearts');
            setInterval(() => {
                const heart = document.createElement('span');
                heart.innerHTML = '💖';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                heartsContainer.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 300);
        }

        window.onload = typeWriter;
    </script>

</body>

</html>
